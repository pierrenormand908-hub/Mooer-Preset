<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mooer Preset</title>
    
    <link rel="apple-touch-icon" href="img/Mooer_Preset.png">
    <link rel="icon" type="image/png" href="img/Mooer_Preset.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mooer Preset">

    <style>
        :root {
            --bg-principal: #1c1c1e;
            --bg-conteneur: #121216;
            --bg-bouton: #3a3a3c;
            --bg-bouton-vista: linear-gradient(to bottom, #4a4a4c 0%, #303032 50%, #202022 100%);
            --texte-principal: #ffffff;
            --border-couleur: #4f4f52;
            --shadow-couleur: rgba(0,0,0,0.5);
            --reflet-glossy: linear-gradient(to bottom, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 40%, rgba(255,255,255,0) 100%);
        }

        [data-theme="light"] {
            --bg-principal: #f2f2f7;
            --bg-conteneur: #e5e5ea; 
            --bg-bouton: #ffffff;
            --bg-bouton-vista: linear-gradient(to bottom, #ffffff 0%, #f2f2f7 50%, #d1d1d6 100%);
            --texte-principal: #000000;
            --border-couleur: #a5a5aa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-principal);
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden; 
            transition: background-color 0.3s ease;
        }

        .wrapper-principal {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .barre-theme { display: flex; justify-content: space-between; width: 100%; max-width: 360px; margin-bottom: 5px; }
        .btn-theme { background-color: var(--bg-bouton); border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; box-shadow: 0 2px 4px var(--shadow-couleur); }

        h1 { font-size: 22px; color: var(--texte-principal); margin-bottom: 25px; }

        .selecteurs-container { display: flex; gap: 12px; width: 100%; max-width: 360px; margin-bottom: 25px; justify-content: center; }

        .btn-guitare {
            width: 100px; height: 55px; background: var(--bg-bouton-vista); border: 1px solid var(--border-couleur);
            border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700;
            color: var(--texte-principal); box-shadow: 0 4px 6px var(--shadow-couleur); cursor: pointer;
        }
        .btn-guitare.actif { background: linear-gradient(to bottom, #3fa2ff 0%, #0066cc 100%); border-color: #003d80; transform: translateY(3px); }

        .rectangle-icone-central { width: 45px; height: 88px; background-color: var(--bg-bouton); border: 1px solid var(--border-couleur); border-radius: 8px; display: flex; align-items: center; justify-content: center; }

        .nom-preset-affiche {
            font-size: 13px; font-weight: 700; color: #0a84ff; margin-bottom: 15px; text-transform: uppercase;
            background-color: var(--bg-conteneur); padding: 8px 16px; border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.3);
            box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.6);
        }

        /* BAIE DES PÉDALES : Ombre externe retirée, aspect creusé conservé */
        .barre-effets {
            width: 100%; max-width: 400px; background-color: var(--bg-conteneur); border-radius: 14px;
            padding: 24px 15px 16px 15px; min-height: 135px; display: flex; gap: 14px; overflow-x: auto;
            border-top: 2px solid rgba(0, 0, 0, 0.8); border-left: 2px solid rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2); border-right: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 6px 12px rgba(0, 0, 0, 0.7), inset 0 -2px 6px rgba(255, 255, 255, 0.05);
        }

        /* PANNEAU RÉGLAGES : Effet creusé appliqué */
        .zone-reglages-panel {
            width: 100%; max-width: 400px; background-color: var(--bg-conteneur); border-radius: 14px;
            padding: 15px; margin-top: 20px; box-sizing: border-box; display: none;
            border-top: 2px solid rgba(0, 0, 0, 0.8); border-left: 2px solid rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2); border-right: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.6);
        }

        .bloc-effet {
            background: var(--bg-bouton-vista); border: 1px solid var(--border-couleur); border-radius: 10px;
            width: 74px; height: 74px; display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; padding: 6px 4px; color: var(--texte-principal);
            flex-shrink: 0; box-shadow: 0 4px 6px var(--shadow-couleur);
        }
        .bloc-effet.actif { transform: translateY(4px); box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.5); }
        .bloc-effet span { font-size: 9px; font-weight: 800; background-color: rgba(0,0,0,0.5); padding: 2px 4px; border-radius: 4px; }

        .titre-reglages { font-size: 11px; font-weight: 700; color: #0a84ff; margin-bottom: 10px; text-transform: uppercase; }
        .ligne-potentiometre { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; }
        .nom-param { width: 70px; font-size: 11px; color: var(--texte-principal); }
        .curseur-slider { flex: 1; height: 4px; background: var(--bg-bouton); border-radius: 2px; }
        .carre-numerique { width: 36px; height: 22px; background-color: var(--bg-bouton); border: 1px solid var(--border-couleur); text-align: center; color: var(--texte-principal); }
    </style>
</head>
<body>
    <div class="wrapper-principal">
        <div class="barre-theme">
            <button class="btn-theme" onclick="changerTheme('light')">☀️</button>
            <button class="btn-theme" onclick="changerTheme('dark')">🌙</button>
        </div>
        <h1>Mooer Preset</h1>
        <div class="selecteurs-container">
            <div id="btn-elec" class="btn-guitare actif" onclick="changerMode('electrique')">ÉLECTRIQUE</div>
            <div class="rectangle-icone-central"><img src="img/electrique-removebg-preview.png" style="width:100%"></div>
            <div id="btn-acoust" class="btn-guitare" onclick="changerMode('acoustique')">ACOUSTIQUE</div>
        </div>
        <div class="nom-preset-affiche" id="nomPresetAffiche">Preset : Guitare Électrique</div>
        <div class="barre-effets" id="zoneEffets"></div>
        <div class="zone-reglages-panel" id="panelReglages">
            <div class="titre-reglages" id="titreReglages">Réglages</div>
            <div id="conteneurSliders"></div>
        </div>
    </div>
    <script>
        // Logique simplifiée pour la démo
        function changerTheme(t) { document.documentElement.setAttribute('data-theme', t); }
        function changerMode(m) { 
            // Mise à jour de l'UI en fonction du mode...
            document.getElementById('nomPresetAffiche').innerText = "Preset : " + (m === 'electrique' ? "Guitare Électrique" : "Guitare Acoustique");
            document.getElementById('panelReglages').style.display = 'block'; // Pour tester l'affichage
        }
    </script>
</body>
</html>
