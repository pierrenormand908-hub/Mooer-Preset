<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mooer Prime</title>
    <style>
        /* THÈME SOMBRE (PAR DÉFAUT) */
        :root {
            --bg-principal: #1c1c1e;
            --bg-conteneur: #2c2c2e;
            --bg-bouton: #3a3a3c;
            --bg-bouton-actif: #48484a;
            --texte-principal: #ffffff;
            --texte-secondaire: #aeaeb2;
            --border-couleur: #3a3a3c;
            --shadow-couleur: rgba(0,0,0,0.25);
        }

        /* THÈME CLAIR */
        [data-theme="light"] {
            --bg-principal: #f2f2f7;
            --bg-conteneur: #ffffff;
            --bg-bouton: #e5e5ea;
            --bg-bouton-actif: #d1d1d6;
            --texte-principal: #000000;
            --texte-secondaire: #8e8e93;
            --border-couleur: #e5e5ea;
            --shadow-couleur: rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-principal);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden; 
            transition: background-color 0.3s ease;
        }

        .barre-theme {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 360px;
            margin-bottom: 5px;
        }

        .btn-theme {
            background-color: var(--bg-conteneur);
            border: 1px solid var(--border-couleur);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 4px var(--shadow-couleur);
            transition: all 0.2s ease;
        }
        .btn-theme:active { transform: scale(0.9); }

        h1 {
            font-size: 22px;
            color: var(--texte-principal);
            margin-top: 0;
            margin-bottom: 25px;
            transition: color 0.3s ease;
        }

        .selecteurs-container {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 360px;
            margin-bottom: 25px;
            justify-content: center;
            align-items: center;
        }

        .colonne-preset {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .btn-guitare {
            width: 100px;
            height: 55px;
            background-color: var(--bg-conteneur);
            border: 2px solid var(--border-couleur);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--texte-principal);
            letter-spacing: 0.5px;
            box-shadow: 0 4px 6px var(--shadow-couleur);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-guitare.actif {
            background-color: #0a84ff;
            border-color: #0a84ff;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.4);
        }

        .rectangle-icone-central {
            width: 45px; 
            height: 88px;
            border: 2px solid var(--border-couleur);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-conteneur);
            box-shadow: inset 0 2px 4px var(--shadow-couleur);
            overflow: hidden;
        }

        .mon-icone-png {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        .actions-preset-container {
            display: flex;
            gap: 6px;
            width: 110px;
        }

        .btn-enregistrer, .btn-effacer {
            flex: 1;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 4px var(--shadow-couleur);
            height: 30px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-enregistrer { background-color: #30d158; }
        .btn-enregistrer:active { background-color: #248a3d; }

        .btn-effacer { background-color: #ff453a; }
        .btn-effacer:active { background-color: #c72c24; }

        .nom-preset-affiche {
            font-size: 14px;
            font-weight: 600;
            color: #0a84ff;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background-color: var(--bg-conteneur);
            padding: 6px 14px;
            border-radius: 20px;
            box-shadow: 0 2px 4px var(--shadow-couleur);
        }

        .barre-effets {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-conteneur);
            border-radius: 16px;
            padding: 20px 15px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px var(--shadow-couleur);
            min-height: 120px;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: flex-start;
            overflow-x: auto;
            position: relative;
            touch-action: pan-x; 
            -webkit-overflow-scrolling: touch;
        }

        .bloc-effet {
            background-color: var(--bg-bouton);
            border: 2px solid var(--bg-bouton-actif);
            border-radius: 12px;
            width: 70px;
            height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: var(--texte-principal);
            flex-shrink: 0;
            cursor: grab;
            box-shadow: 0 2px 4px var(--shadow-couleur);
            transition: all 0.2s ease;
            touch-action: none;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .bloc-effet:active { cursor: grabbing; }

        .bloc-effet.en-deplacement {
            opacity: 0.5;
            border: 2px dashed #0a84ff !important;
            transform: scale(0.95);
        }

        .bloc-effet span {
            font-size: 9px;
            font-weight: bold;
            color: #e5e5ea;
            margin-top: 5px;
            text-align: center;
            max-width: 65px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            background-color: rgba(0,0,0,0.4);
            padding: 2px 5px;
            border-radius: 4px;
        }

        /* COULEURS DES PÉDALES */
        .bloc-effet.actif[data-id="DYNA"]   { background-color: #ffcc00; border-color: #ffd60a; color: #000000; text-shadow: none; }
        .bloc-effet.actif[data-id="COMP"]   { background-color: #ff9500; border-color: #ff9f0a; color: #ffffff; }
        .bloc-effet.actif[data-id="OD"]     { background-color: #ff453a; border-color: #ff453a; color: #ffffff; }
        .bloc-effet.actif[data-id="AMP"]    { background-color: #30d158; border-color: #34c759; color: #ffffff; }
        .bloc-effet.actif[data-id="EQ"]     { background-color: #5856d6; border-color: #5e5ce6; color: #ffffff; }
        .bloc-effet.actif[data-id="CAB"]    { background-color: #bf5af2; border-color: #c670f5; color: #ffffff; }
        .bloc-effet.actif[data-id="MOD"]    { background-color: #0a84ff; border-color: #0a84ff; color: #ffffff; }
        .bloc-effet.actif[data-id="DELAY"]  { background-color: #64d2ff; border-color: #70d6ff; color: #000000; text-shadow: none; }
        .bloc-effet.actif[data-id="REVERB"] { background-color: #00ca4e; border-color: #00ca4e; color: #ffffff; }

        .bloc-effet.actif[data-id="DYNA"] span, 
        .bloc-effet.actif[data-id="DELAY"] span {
            color: #000000;
            background-color: rgba(255,255,255,0.5);
        }

        /* SECTION DES RÉGLAGES STYLE ME-80 COMPACT */
        .zone-reglages-panel {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-conteneur);
            border-radius: 14px;
            padding: 10px 12px;
            margin-top: 15px;
            box-sizing: border-box;
            box-shadow: 0 4px 12px var(--shadow-couleur);
            display: none;
        }

        .titre-reglages {
            font-size: 11px;
            font-weight: 700;
            color: #0a84ff;
            margin-bottom: 8px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-couleur);
            padding-bottom: 3px;
            letter-spacing: 0.5px;
        }

        .ligne-potentiometre {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            gap: 8px;
        }

        .nom-param {
            width: 75px;
            font-size: 11px;
            font-weight: 600;
            color: var(--texte-principal);
            text-transform: capitalize;
        }

        .curseur-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            border-radius: 2px;
            background: var(--bg-bouton);
            outline: none;
        }

        .curseur-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #0a84ff;
            cursor: pointer;
        }

        .carre-numerique {
            width: 36px;
            height: 22px;
            background-color: var(--bg-bouton);
            border: 1px solid var(--border-couleur);
            border-radius: 4px;
            color: var(--texte-principal);
            text-align: center;
            font-size: 11px;
            font-weight: bold;
        }

        /* MODAL POPUP */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-contenu {
            background-color: var(--bg-conteneur);
            border: 1px solid var(--border-couleur);
            width: 85%;
            max-width: 320px;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.4);
            text-align: center;
        }

        .modal-titre {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--texte-principal);
        }

        .liste-choix {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
        }

        .btn-choix {
            background-color: var(--bg-bouton);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            color: #0a84ff;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-eteindre {
            margin-top: 15px;
            background-color: var(--bg-bouton-actif);
            color: #ff453a;
            border: none;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 2px 4px var(--shadow-couleur);
        }
    </style>
</head>
<body>

    <div class="barre-theme">
        <button class="btn-theme" onclick="changerTheme('light')" title="Mode Clair">☀️</button>
        <button class="btn-theme" onclick="changerTheme('dark')" title="Mode Sombre">🌙</button>
    </div>

    <h1>Mooer Prime</h1>

    <div class="selecteurs-container">
        <div class="colonne-preset">
            <div id="btn-elec" class="btn-guitare actif" onclick="changerMode('electrique')">
                ÉLECTRIQUE
            </div>
            <div class="actions-preset-container">
                <button class="btn-enregistrer" onclick="enregistrerPreset('electrique')">Sauver</button>
                <button class="btn-effacer" onclick="effacerPreset('effacer')">Effacer</button>
            </div>
        </div>

        <div class="rectangle-icone-central" id="zoneIconeCentrale">
            <img src="img/electrique-removebg-preview.png" alt="Icône Guitare" class="mon-icone-png" id="imageGuitareCentrale">
        </div>

        <div class="colonne-preset">
            <div id="btn-acoust" class="btn-guitare" onclick="changerMode('acoustique')">
                ACOUSTIQUE
            </div>
            <div class="actions-preset-container">
                <button class="btn-enregistrer" onclick="enregistrerPreset('acoustique')">Sauver</button>
                <button class="btn-effacer" onclick="effacerPreset('acoustique')">Effacer</button>
            </div>
        </div>
    </div>

    <div class="nom-preset-affiche" id="nomPresetAffiche">Preset : Guitare Électrique</div>

    <div class="barre-effets" id="zoneEffets"></div>

    <!-- PANEL POUR LES POTENTIOMÈTRES COMPACTS -->
    <div class="zone-reglages-panel" id="panelReglages">
        <div class="titre-reglages" id="titreReglages">Réglages : Aucun</div>
        <div id="conteneurSliders"></div>
    </div>

    <div class="modal" id="monPopUp">
        <div class="modal-contenu">
            <div class="modal-titre" id="titrePopUp">Choisir l'effet</div>
            <div class="liste-choix" id="zoneChoix"></div>
            <button class="btn-eteindre" onclick="eteindreEffetActuel()">Éteindre l'effet</button>
        </div>
    </div>

    <script>
        // MODÈLES DE PÉDALES À JOUR
        const modelesPedales = {
            'DYNA': ['NG', 'Comp', 'Touch Wah', 'Auto Wah'],
            'OD': [
                'Pure Boost', 'Flex Boost', 'Tube DR', '808', 'Gold Clon', 
                'D - Drive', 'Jimmy OD', 'Full DR', 'Beebee Pre', 'Beebee +', 
                'Black Rat', 'Grey Faze', 'Muffy', 'Full DS', 'Shed', 'Riet', 
                'MTL Zone', 'MTL Master', 'Obsessive Dist'
            ],
            'AMP': [
                '65 us DLX', '65 us TW', '59 us Bass', 'US Sonic', 'US Blues CL', 
                'Us Blues OD', 'E650 CL', 'Powerbell CL', 'Blacknight CL', 'Mark III CL', 
                'Mark V CL', 'Tri Rec CL', 'Rockvrb CL', 'Dr Zee 18 JR', 'Dr Zee Reck', 
                'Jet 100H CL', 'Jazz 120', 'UK 30 CL', 'UK 30 OD', 'HWT 103', 
                'PV 5050 CL', 'REgal Tone CL', 'Regal Tone OD1', 'Carol CL', 'Cardeff', 
                'EV 5050 CL', 'HT Club CL', 'Hugen CL', 'Koche OD', 'J 800', 
                'J 900', 'PLX 100', 'E650 DS', 'Powerbell DS', 'Blacknight DS', 
                'Mark III DS', 'Mark V DS', 'Tri Rec DS', 'Rockvrb DS', 'Citrus 30', 
                'Citrus 50', 'Slow 100 CR', 'Slow 100 DS', 'Jet 100H OD', 'PV 5050 DS', 
                'Regal Tone OD2', 'Carol OD', 'EV 5050 DS', 'HT Club DS', 'Hugen OD', 
                'Huger DS', 'Koche DS'
            ],
            'CAB': [
                'Regal Tone 110', 'US DLX 112', 'Sonic 112', 'Blues 112', 'Mark 112', 
                'Dr Zee 112', 'Cardeff 112', 'US TW 212', 'Citrus 212', 'Dr Zee 212', 
                'Jazz 212', 'Uk 212', 'Tow Stones 212', 'US Bass 410', '1960 412', 
                'Eagle P412', 'Eagle S412', 'Rec 412', 'Citrus 412', 'Slow 412', 
                'PV 5050 412', 'EV 5050 412', 'HT 412', 'Diesel 412'
            ],
            'MOD': [
                'Phaser', 'Step Phaser', 'Flanger', 'Jet Flanger', 'Tremolo', 
                'Stutter', 'Vibrato', 'Pitch Shift', 'Rotary', 'Ana Chorus', 
                'Tri Chorus', 'Ring', 'Q - Filter', 'Lofi', 'Slow Gear'
            ],
            'DELAY': ['Digital', 'Analog', 'Real Echo', 'Tape', 'Mod', 'Reverse'],
            'REVERB': ['Room', 'Hall', 'Plate', 'Spring', 'Mod'],
            'COMP': ['Dynacomp', 'Studio Comp'],
            'EQ': ['7-Band Graphic']
        };

        const structureReglages = {
            'NG': ['Threshold'],
            'Comp': ['Attack', 'Threshold', 'Ratio', 'Level'],
            'Touch Wah': ['Attack', 'Sens', 'Peak', 'Level'],
            'Auto Wah': ['Rate', 'Range', 'Peak', 'Level']
        };

        // Configuration OD
        modelesPedales.OD.forEach(modele => {
            structureReglages[modele] = ['Gain', 'Tone', 'Vol'];
        });

        // Configuration AMP
        modelesPedales.AMP.forEach(modele => {
            structureReglages[modele] = ['Gain', 'Bass', 'Mid', 'Treble', 'Presence', 'Master'];
        });

        // Configuration CAB
        modelesPedales.CAB.forEach(modele => {
            structureReglages[modele] = [];
        });

        // Configuration REVERB
        modelesPedales.REVERB.forEach(modele => {
            structureReglages[modele] = ['Pre Delay', 'Level', 'Decay', 'Tone'];
        });

        // Configuration DELAY
        modelesPedales.DELAY.forEach(modele => {
            structureReglages[modele] = ['Level', 'Feedback', 'Time'];
        });

        // Configuration MOD SUR MESURE
        structureReglages['Phaser']      = ['Rate', 'Level', 'Depth'];
        structureReglages['Step Phaser'] = ['Rate', 'Level', 'Depth'];
        structureReglages['Flanger']     = ['Rate', 'Level', 'Feedback'];
        structureReglages['Jet Flanger'] = ['Rate', 'Level', 'Feedback'];
        structureReglages['Tremolo']     = ['Rate', 'Level', 'Tone'];
        structureReglages['Stutter']     = ['Rate', 'Level', 'Tone'];
        structureReglages['Vibrato']     = ['Rate', 'Level', 'Tone'];
        structureReglages['Pitch Shift'] = ['Mix', 'Tone', 'Pitch'];
        structureReglages['Rotary']      = ['Rate', 'Mix', 'Tone'];
        structureReglages['Ana Chorus']  = ['Rate', 'Mix', 'Tone', 'Depth'];
        structureReglages['Tri Chorus']  = ['Rate', 'Mix', 'Tone', 'Depth'];
        structureReglages['Ring']        = ['Rate', 'Mix', 'Tone'];
        structureReglages['Q - Filter']  = ['Rate', 'Mix', 'Q'];
        structureReglages['Lofi']        = ['Sample', 'Mix', 'Bit'];
        structureReglages['Slow Gear']   = ['Rise', 'Level'];

        let presetsSauvegardes = {
            electrique: {
                nom: 'Guitare Électrique',
                ordre: ['DYNA', 'AMP', 'CAB', 'OD', 'MOD', 'DELAY', 'REVERB'],
                effets: { 'DYNA': 'Non défini', 'AMP': 'Non défini', 'CAB': 'Non défini', 'OD': 'Non défini', 'MOD': 'Non défini', 'DELAY': 'Non défini', 'REVERB': 'Non défini' },
                valeursParams: {}
            },
            acoustique: {
                nom: 'Guitare Acoustique',
                ordre: ['COMP', 'EQ', 'REVERB'],
                effets: { 'COMP': 'Non défini', 'EQ': 'Non défini', 'REVERB': 'Non défini' },
                valeursParams: {}
            }
        };

        let modeActuel = 'electrique';
        let categorieEnCours = '';
        let elementEnCours = null;

        window.onload = function() {
            let themeSauvegarde = localStorage.getItem('app_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', themeSauvegarde);

            let sauvegardeElec = localStorage.getItem('preset_electrique_v2');
            let sauvegardeAcoust = localStorage.getItem('preset_acoustique_v2');
            
            if (sauvegardeElec) { presetsSauvegardes.electrique = JSON.parse(sauvegardeElec); }
            if (sauvegardeAcoust) { presetsSauvegardes.acoustique = JSON.parse(sauvegardeAcoust); }

            changerMode('electrique');
            initDragAndDrop();
        };

        function changerTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('app_theme', theme);
        }

        function changerMode(mode) {
            modeActuel = mode;
            document.getElementById('btn-elec').classList.remove('actif');
            document.getElementById('btn-acoust').classList.remove('actif');
            
            document.getElementById('nomPresetAffiche').innerText = "Preset : " + presetsSauvegardes[mode].nom;
            
            let imageElement = document.getElementById('imageGuitareCentrale');
            if (mode === 'electrique') {
                document.getElementById('btn-elec').classList.add('actif');
                imageElement.src = 'img/electrique-removebg-preview.png'; 
            } else {
                document.getElementById('btn-acoust').classList.add('actif');
                imageElement.src = 'img/guitar_28109.png'; 
            }
            
            let data = presetsSauvegardes[mode].effets;
            let ordreActuel = presetsSauvegardes[mode].ordre || Object.keys(data);
            
            let htmlEffets = '';
            ordreActuel.forEach(cat => {
                if (data[cat] !== undefined) {
                    let classeActive = (data[cat] !== "Non défini") ? "actif" : "";
                    htmlEffets += `<div class="bloc-effet ${classeActive}" draggable="true" data-id="${cat}">
                        ${cat}<span class="choix-actuel" id="txt-${cat}">${data[cat]}</span>
                    </div>`;
                }
            });
            
            document.getElementById('zoneEffets').innerHTML = htmlEffets;
            document.getElementById('panelReglages').style.display = 'none';
            
            let premiereCat = ordreActuel[0];
            if (premiereCat && data[premiereCat] !== "Non défini") {
                afficherZoneSliders(premiereCat, data[premiereCat]);
            }

            attacherEvenementsBlocs();
        }

        function attacherEvenementsBlocs() {
            const blocs = document.querySelectorAll('.bloc-effet');
            let isDragging = false;

            blocs.forEach(bloc => {
                let categorie = bloc.getAttribute('data-id');

                bloc.addEventListener('click', (e) => {
                    if (!isDragging) {
                        ouvrirPopUp(categorie, bloc);
                    }
                });

                // SOURIS DRAG
                bloc.addEventListener('dragstart', (e) => {
                    isDragging = true;
                    bloc.classList.add('en-deplacement');
                    e.dataTransfer.setData('text/plain', categorie);
                });

                bloc.addEventListener('dragend', () => {
                    isDragging = false;
                    bloc.classList.remove('en-deplacement');
                    sauvegarderOrdreActuel();
                });

                // TACTILE DRAG
                let touchStartX, touchStartY;
                bloc.addEventListener('touchstart', (e) => {
                    isDragging = false; 
                    const touch = e.touches[0];
                    touchStartX = touch.clientX;
                    touchStartY = touch.clientY;
                }, { passive: true });

                bloc.addEventListener('touchmove', (e) => {
                    const touch = e.touches[0];
                    let deltaX = Math.abs(touch.clientX - touchStartX);
                    let deltaY = Math.abs(touch.clientY - touchStartY);

                    if (deltaX > 8 && deltaX > deltaY && !isDragging) return;

                    if (deltaX > 8 || deltaY > 8) {
                        if (e.cancelable) e.preventDefault();
                        isDragging = true;
                        bloc.classList.add('en-deplacement');
                        
                        const conteneur = document.getElementById('zoneEffets');
                        const cible = document.elementFromPoint(touch.clientX, touch.clientY);
                        const blocCible = cible ? cible.closest('.bloc-effet') : null;
                        
                        if (blocCible && blocCible !== bloc) {
                            const rect = blocCible.getBoundingClientRect();
                            const milieu = rect.left + rect.width / 2;
                            if (touch.clientX < milieu) {
                                conteneur.insertBefore(bloc, blocCible);
                            } else {
                                conteneur.insertBefore(bloc, blocCible.nextSibling);
                            }
                        }
                    }
                }, { passive: false });

                bloc.addEventListener('touchend', (e) => {
                    if (isDragging) {
                        if (e.cancelable) e.preventDefault();
                        bloc.classList.remove('en-deplacement');
                        sauvegarderOrdreActuel();
                        setTimeout(() => { isDragging = false; }, 50);
                    }
                });
            });
        }

        function afficherZoneSliders(categorie, nomModele) {
            const panel = document.getElementById('panelReglages');
            const conteneur = document.getElementById('conteneurSliders');
            
            let listeParams = structureReglages[nomModele] || []; 
            
            if (listeParams.length === 0) {
                panel.style.display = 'none';
                return;
            }

            document.getElementById('titreReglages').innerText = `Contrôles : ${categorie} (${nomModele})`;
            let htmlSliders = '';
            
            if (!presetsSauvegardes[modeActuel].valeursParams) {
                presetsSauvegardes[modeActuel].valeursParams = {};
            }
            if (!presetsSauvegardes[modeActuel].valeursParams[nomModele]) {
                presetsSauvegardes[modeActuel].valeursParams[nomModele] = {};
            }

            listeParams.forEach(param => {
                // Règle d'amplitude : 0 à 1000 pour Time, sinon 0 à 100
                let maxBorne = (param === 'Time') ? 1000 : 100;
                let valeurParDefaut = (param === 'Time') ? 350 : 50;

                if (presetsSauvegardes[modeActuel].valeursParams[nomModele][param] === undefined) {
                    presetsSauvegardes[modeActuel].valeursParams[nomModele][param] = valeurParDefaut;
                }
                
                let valeurActuelle = presetsSauvegardes[modeActuel].valeursParams[nomModele][param];

                htmlSliders += `
                <div class="ligne-potentiometre">
                    <span class="nom-param">${param}</span>
                    <input type="range" class="curseur-slider" min="0" max="${maxBorne}" value="${valeurActuelle}" 
                        oninput="mettreAJourValeurParam('${nomModele}', '${param}', this.value, 'input', ${maxBorne})">
                    <input type="number" class="carre-numerique" min="0" max="${maxBorne}" value="${valeurActuelle}" 
                        oninput="mettreAJourValeurParam('${nomModele}', '${param}', this.value, 'slider', ${maxBorne})">
                </div>`;
            });

            conteneur.innerHTML = htmlSliders;
            panel.style.display = 'block';
        }

        function mettreAJourValeurParam(nomModele, param, valeur, cibleAChanger, maxBorne) {
            let valNum = parseInt(valeur) || 0;
            if (valNum < 0) valNum = 0;
            if (valNum > maxBorne) valNum = maxBorne;

            presetsSauvegardes[modeActuel].valeursParams[nomModele][param] = valNum;

            const ligne = event.target.closest('.ligne-potentiometre');
            if (cibleAChanger === 'input') {
                ligne.querySelector('.carre-numerique').value = valNum;
            } else {
                ligne.querySelector('.curseur-slider').value = valNum;
            }
            sauvegarderOrdreActuel();
        }

        function ouvrirPopUp(categorie, element) {
            categorieEnCours = categorie;
            elementEnCours = element;
            document.getElementById('titrePopUp').innerText = "Modèles " + categorie;
            
            let pool = modelesPedales[categorie] || [];
            let htmlChoix = '';
            pool.forEach(modele => {
                htmlChoix += `<button class="btn-choix" onclick="selectionnerModele('${modele}')">${modele}</button>`;
            });
            
            document.getElementById('zoneChoix').innerHTML = htmlChoix;
            document.getElementById('monPopUp').style.display = 'flex';
        }

        function selectionnerModele(nomModele) {
            if (elementEnCours) {
                let spanSousTexte = elementEnCours.querySelector('.choix-actuel');
                spanSousTexte.innerText = nomModele;
                
                if (nomModele !== "Non défini") {
                    elementEnCours.classList.add('actif');
                    afficherZoneSliders(categorieEnCours, nomModele);
                } else {
                    elementEnCours.classList.remove('actif');
                    document.getElementById('panelReglages').style.display = 'none';
                }
            }
            presetsSauvegardes[modeActuel].effets[categorieEnCours] = nomModele;
            sauvegarderOrdreActuel();
            fermerPopUp();
        }

        function eteindreEffetActuel() {
            if (categorieEnCours) {
                document.getElementById('panelReglages').style.display = 'none';
            }
            selectionnerModele("Non défini");
        }

        function fermerPopUp() {
            document.getElementById('monPopUp').style.display = 'none';
        }

        function initDragAndDrop() {
            const conteneur = document.getElementById('zoneEffets');
            conteneur.addEventListener('dragover', (e) => {
                e.preventDefault();
                const blocEnDeplacement = document.querySelector('.en-deplacement');
                if (!blocEnDeplacement) return;

                const apresElement = obtenirElementApres(conteneur, e.clientX);
                if (apresElement == null) {
                    conteneur.appendChild(blocEnDeplacement);
                } else {
                    conteneur.insertBefore(blocEnDeplacement, apresElement);
                }
            });
        }

        function obtenirElementApres(conteneur, x) {
            const elementsFixes = [...conteneur.querySelectorAll('.bloc-effet:not(.en-deplacement)')];
            return elementsFixes.reduce((proche, enfant) => {
                const boite = enfant.getBoundingClientRect();
                const decalage = x - boite.left - boite.width / 2;
                if (decalage < 0 && decalage > proche.decalage) {
                    return { decalage: decalage, element: enfant };
                } else {
                    return proche;
                }
            }, { decalage: Number.NEGATIVE_INFINITY }).element;
        }

        function sauvegarderOrdreActuel() {
            const blocs = document.querySelectorAll('.bloc-effet');
            let nouvelOrdre = [];
            blocs.forEach(bloc => {
                nouvelOrdre.push(bloc.getAttribute('data-id'));
            });
            presetsSauvegardes[modeActuel].ordre = nouvelOrdre;
            localStorage.setItem('preset_' + modeActuel + '_v2', JSON.stringify(presetsSauvegardes[modeActuel]));
        }

        function enregistrerPreset(typeGuitare) {
            let nomParDefaut = presetsSauvegardes[typeGuitare].nom;
            let nouveauNom = prompt("Donne un nom à ton preset :", nomParDefaut);
            if (nouveauNom !== null && nouveauNom.trim() !== "") {
                presetsSauvegardes[typeGuitare].nom = nouveauNom;
            }
            sauvegarderOrdreActuel();
            alert("Preset sauvegardé avec succès !");
        }

        function effacerPreset(typeGuitare) {
            presetsSauvegardes[typeGuitare].nom = typeGuitare === 'electrique' ? 'Guitare Électrique' : 'Guitare Acoustique';
            presetsSauvegardes[typeGuitare].ordre = typeGuitare === 'electrique' ? ['DYNA', 'AMP', 'CAB', 'OD', 'MOD', 'DELAY', 'REVERB'] : ['COMP', 'EQ', 'REVERB'];
            presetsSauvegardes[typeGuitare].effets = {};
            presetsSauvegardes[typeGuitare].valeursParams = {};
            
            presetsSauvegardes[typeGuitare].ordre.forEach(cat => {
                presetsSauvegardes[typeGuitare].effets[cat] = "Non défini";
            });
            
            localStorage.setItem('preset_' + typeGuitare + '_v2', JSON.stringify(presetsSauvegardes[typeGuitare]));
            if (modeActuel === typeGuitare) {
                changerMode(typeGuitare);
            }
            alert("Preset réinitialisé !");
        }
    </script>
</body>
</html>
